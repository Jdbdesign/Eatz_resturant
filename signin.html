<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Eatz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shine.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --primary:#f66d09;--primary-dark:#9e4300;--primary-light:#ffdbcb;
      --surface:#fbf9f9;--surface-low:#f5f3f3;--surface-mid:#efeded;
      --dark:#1b1c1c;--on-surface:#1b1c1c;--on-surface-v:#594236;
      --outline:#8d7164;--outline-v:#e1c0b1;
      --shadow-brand:0 8px 30px rgba(246,109,9,.35);
      --ease-out:cubic-bezier(.16,1,.3,1);
      --ease-spring:cubic-bezier(.34,1.56,.64,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%}
    body{font-family:'Manrope',sans-serif;min-height:100vh;display:flex;flex-direction:column;
      background:#1b1c1c;color:var(--on-surface);overflow-x:hidden;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(246,109,9,.14) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(246,109,9,.07) 0%, transparent 40%)}
    :focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:4px}
    :focus:not(:focus-visible){outline:none}

    /* ── Back link ── */
    .back-link{position:fixed;top:24px;left:24px;display:inline-flex;align-items:center;gap:6px;
      color:rgba(255,255,255,.55);text-decoration:none;font-size:13px;font-weight:600;
      padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);transition:all 150ms;z-index:10}
    .back-link:hover{color:#fff;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}

    /* ── Page layout ── */
    .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 16px 40px}

    /* ── Card ── */
    .auth-card{background:#fff;border-radius:24px;width:100%;max-width:440px;
      box-shadow:0 32px 80px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.3);
      overflow:hidden}
    .auth-card-accent{height:4px;background:linear-gradient(90deg,var(--primary) 0%,#ff9a4a 100%)}
    .auth-card-body{padding:40px 40px 36px}
    @media(max-width:480px){.auth-card-body{padding:28px 24px 28px}}

    /* ── Logo ── */
    .auth-logo-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:28px}
    .auth-logo-icon{width:52px;height:52px;background:var(--primary);border-radius:16px;
      display:flex;align-items:center;justify-content:center;margin-right:10px;
      box-shadow:var(--shadow-brand);flex-shrink:0}
    .auth-logo-icon span{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1}
    .auth-logo-text{font-size:26px;font-weight:800;color:var(--dark);letter-spacing:-.03em}
    .auth-logo-text .dot{display:inline-block;width:7px;height:7px;background:var(--primary);
      border-radius:50%;margin-left:2px;margin-bottom:4px;vertical-align:middle}

    /* ── Headings ── */
    .auth-heading{font-size:22px;font-weight:800;color:var(--dark);letter-spacing:-.03em;
      text-align:center;margin-bottom:6px}
    .auth-sub{font-size:14px;color:var(--outline);text-align:center;margin-bottom:32px;font-weight:500}

    /* ── Form fields ── */
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:13px;font-weight:700;color:var(--on-surface);
      margin-bottom:6px;letter-spacing:.01em}
    .form-input{width:100%;padding:13px 16px;border:1.5px solid var(--outline-v);
      border-radius:10px;font-family:'Manrope',sans-serif;font-size:15px;color:var(--on-surface);
      background:#fff;transition:border-color 150ms,box-shadow 150ms;outline:none}
    .form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(246,109,9,.1)}
    .form-input.error{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.08)}
    .form-input::placeholder{color:var(--outline-v)}
    .form-err{font-size:12px;color:#ef4444;margin-top:5px;font-weight:600;display:none}
    .form-err.show{display:block}

    /* Password wrapper */
    .pw-wrap{position:relative}
    .pw-wrap .form-input{padding-right:48px}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:var(--outline);
      padding:6px;display:flex;align-items:center;border-radius:6px;transition:color 150ms}
    .pw-toggle:hover{color:var(--dark)}

    /* Remember + forgot row */
    .auth-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px}
    .remember-label{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
    .remember-label input[type="checkbox"]{width:17px;height:17px;accent-color:var(--primary);
      cursor:pointer;flex-shrink:0;border-radius:4px}
    .remember-text{font-size:13px;font-weight:600;color:var(--on-surface-v)}
    .forgot-link{font-size:13px;font-weight:700;color:var(--primary);text-decoration:none;
      white-space:nowrap;transition:opacity 150ms}
    .forgot-link:hover{opacity:.75}

    /* Submit button */
    .signin-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:12px;
      padding:16px;font-family:'Manrope',sans-serif;font-size:16px;font-weight:700;cursor:pointer;
      transition:all 150ms var(--ease-out);min-height:54px;display:flex;align-items:center;
      justify-content:center;gap:9px;letter-spacing:.01em}
    .signin-btn:hover{background:var(--primary-dark);box-shadow:var(--shadow-brand)}
    .signin-btn:active{transform:scale(.98)}
    .signin-btn:disabled{opacity:.7;cursor:not-allowed;transform:none !important;box-shadow:none !important}

    /* Divider */
    .auth-divider{display:flex;align-items:center;gap:12px;margin:24px 0}
    .auth-divider-line{flex:1;height:1px;background:var(--outline-v)}
    .auth-divider-text{font-size:11px;font-weight:700;color:var(--outline);letter-spacing:.06em;text-transform:uppercase}

    /* Create account */
    .auth-switch{text-align:center;font-size:14px;color:var(--on-surface-v);font-weight:500}
    .auth-switch a{color:var(--primary);font-weight:700;text-decoration:none}
    .auth-switch a:hover{text-decoration:underline}

    /* ── Footer note ── */
    .auth-page-footer{text-align:center;padding:20px 16px;font-size:12px;
      color:rgba(255,255,255,.25);font-weight:500}

    /* ── Spinner ── */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;animation:spin 600ms linear infinite;flex-shrink:0}

    /* ── Toast ── */
    .auth-toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
      background:var(--dark);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;
      font-weight:600;display:flex;align-items:center;gap:10px;
      box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:400;opacity:0;pointer-events:none;
      transition:all 300ms var(--ease-out);white-space:nowrap;font-family:'Manrope',sans-serif}
    .auth-toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;flex-shrink:0}

    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>

  <!-- Back link -->
  <a href="index.html" class="back-link" aria-label="Back to home">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="m15 18-6-6 6-6"/>
    </svg>
    Back to home
  </a>

  <!-- Auth content -->
  <main class="auth-wrap" id="main-content">
    <div class="auth-card" role="main">

      <div class="auth-card-accent" aria-hidden="true"></div>

      <div class="auth-card-body">

        <!-- Logo -->
        <div class="auth-logo-wrap">
          <div class="auth-logo-icon" aria-hidden="true"><span>E</span></div>
          <div class="auth-logo-text">atz<span class="dot" aria-hidden="true"></span></div>
        </div>

        <!-- Heading -->
        <h1 class="auth-heading">Welcome back!</h1>
        <p class="auth-sub">Sign in to your Eatz account to continue</p>

        <!-- Form -->
        <form id="signin-form" onsubmit="handleSignIn(event)" novalidate>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input class="form-input" id="email" type="email" placeholder="you@example.com"
              autocomplete="email" aria-required="true" inputmode="email">
            <div class="form-err" id="err-email" role="alert">Please enter a valid email address.</div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="pw-wrap">
              <input class="form-input" id="password" type="password" placeholder="Enter your password"
                autocomplete="current-password" aria-required="true">
              <button type="button" class="pw-toggle" id="pw-toggle-btn"
                onclick="togglePW()" aria-label="Show password">
                <span id="pw-eye-icon">
                  <!-- Eye icon (password hidden) -->
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </span>
              </button>
            </div>
            <div class="form-err" id="err-pw" role="alert">Please enter your password.</div>
          </div>

          <!-- Remember me + Forgot password -->
          <div class="auth-row">
            <label class="remember-label">
              <input type="checkbox" id="remember-me" checked>
              <span class="remember-text">Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <!-- Submit -->
          <button type="submit" class="signin-btn" id="signin-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Sign In
          </button>

        </form>

        <!-- Divider -->
        <div class="auth-divider" aria-hidden="true">
          <div class="auth-divider-line"></div>
          <span class="auth-divider-text">or</span>
          <div class="auth-divider-line"></div>
        </div>

        <!-- Create account -->
        <p class="auth-switch">
          Don't have an account? <a href="register.html">Create one</a>
        </p>

      </div><!-- /auth-card-body -->
    </div><!-- /auth-card -->
  </main>

  <!-- Page footer -->
  <div class="auth-page-footer">© 2026 Eatz. All rights reserved.</div>

  <!-- Toast -->
  <div id="auth-toast" class="auth-toast" role="status" aria-live="polite">
    <div class="toast-dot" aria-hidden="true"></div>
    <span id="toast-msg">Signed in!</span>
  </div>

  <script>
    var USER_KEY = 'eatz_user';

    // ── If already signed in, redirect away ──────────────────────
    (function () {
      try {
        if (JSON.parse(localStorage.getItem(USER_KEY))) {
          var r = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
          window.location.replace(r);
        }
      } catch (e) {}
    })();

    // ── Password show / hide ─────────────────────────────────────
    var EYE_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    var EYE_OFF = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

    function togglePW() {
      var input = document.getElementById('password');
      var btn   = document.getElementById('pw-toggle-btn');
      var showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      document.getElementById('pw-eye-icon').innerHTML = showing ? EYE_SVG : EYE_OFF;
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    }

    // ── Validation ────────────────────────────────────────────────
    function setFieldErr(inputId, errId, bad, msg) {
      var el  = document.getElementById(inputId);
      var err = document.getElementById(errId);
      if (el)  el.classList.toggle('error', bad);
      if (err) { if (msg) err.textContent = msg; err.classList.toggle('show', bad); }
    }

    function validate() {
      var ok = true;
      var email = document.getElementById('email').value.trim();
      var pw    = document.getElementById('password').value;

      var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      setFieldErr('email', 'err-email', !emailOk);
      if (!emailOk) ok = false;

      setFieldErr('password', 'err-pw', pw.length < 1);
      if (pw.length < 1) ok = false;

      return ok;
    }

    // ── Extract name from email ───────────────────────────────────
    function nameFromEmail(email) {
      var local  = email.split('@')[0].replace(/[0-9]/g, '');
      var parts  = local.split(/[._\-+]/).filter(Boolean);
      var cap    = function (s) { return s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : ''; };
      return {
        firstName: cap(parts[0]) || 'User',
        lastName:  cap(parts[1]) || '',
        email:     email
      };
    }

    // ── Show toast ────────────────────────────────────────────────
    function showToast(msg) {
      var toast = document.getElementById('auth-toast');
      document.getElementById('toast-msg').textContent = msg;
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, 3000);
    }

    // ── Handle sign in ────────────────────────────────────────────
    function handleSignIn(e) {
      e.preventDefault();
      if (!validate()) return;

      var btn = document.getElementById('signin-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Signing in…';

      setTimeout(function () {
        var email    = document.getElementById('email').value.trim();
        var derived  = nameFromEmail(email);

        /* Preserve name the user already set in their profile — only use
           the email-derived name when there is no existing record at all. */
        var existing = null;
        try { existing = JSON.parse(localStorage.getItem(USER_KEY)); } catch (ex) {}
        var user = (existing && existing.email === email)
          ? Object.assign({}, existing, { email: email })
          : derived;

        try { localStorage.setItem(USER_KEY, JSON.stringify(user)); } catch (ex) {}

        showToast('Welcome back, ' + user.firstName + '!');

        setTimeout(function () {
          var redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
          window.location.replace(redirect);
        }, 800);
      }, 1400);
    }

    // ── Clear errors on input ─────────────────────────────────────
    document.getElementById('email').addEventListener('input', function () {
      this.classList.remove('error');
      document.getElementById('err-email').classList.remove('show');
    });
    document.getElementById('password').addEventListener('input', function () {
      this.classList.remove('error');
      document.getElementById('err-pw').classList.remove('show');
    });
  </script>

  <script src="cookie-consent.js"></script>
</body>
</html>
